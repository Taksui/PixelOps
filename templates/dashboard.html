<!DOCTYPE html>
<html>
<head>
    <title>API Monitoring Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #1a1a1a;
            color: #f8f8f8;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            padding: 20px;
        }

        .container {
            border: 4px solid #ffffff;
            padding: 20px;
            background-color: #2b2b2b;
        }

        h1 {
            color: #ff3c38;
            text-shadow: 2px 2px #000;
        }

        .card {
            border: 3px solid #fff;
            padding: 15px;
            margin: 15px 0;
            background: #3a3a3a;
        }

        button {
            font-family: inherit;
            background: #ff3c38;
            color: white;
            border: 3px solid white;
            padding: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #cc2f2c;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>API MONITOR v1</h1>
    <p>SYSTEM STATUS: ONLINE</p>

    <div class="card">
        <p>Requests: <span id="requests">0</span></p>
        <p>Failures: <span id="failures">0</span></p>
        <p>Success Rate: <span id="success">0</span></p>
    </div>

    <div class="card">
        <button onclick="fetchData()">SEND REQUEST</button>
    </div>

    <div class="card">
        <canvas id="chart" width="400" height="200"></canvas>
    </div>
</div>

<script>
let chart;

async function fetchMetrics() {
    const res = await fetch('/metrics');
    const data = await res.json();

    document.getElementById('requests').innerText = data.total_requests;
    document.getElementById('failures').innerText = data.failures;
    document.getElementById('success').innerText = data.success_rate;

    updateChart(data);
}

function updateChart(data) {
    const chartData = {
        labels: ["Success", "Failures"],
        datasets: [{
            label: "API Health",
            data: [
                data.total_requests - data.failures,
                data.failures
            ]
        }]
    };

    if (chart) {
        chart.data = chartData;
        chart.update();
    } else {
        const ctx = document.getElementById('chart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'bar',
            data: chartData
        });
    }
}

async function fetchData() {
    await fetch('/data');
    fetchMetrics();
}

// Auto refresh
setInterval(fetchMetrics, 2000);
fetchMetrics();
</script>

</body>
</html>
